<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380, initial-scale=1.0">
  <title>RemAdder</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="flex items-center gap-md">
        <img src="../icons/logo.png" class="logo-img" alt="RemAdder">
        <div>
          <h1 class="popup-title">RemAdder</h1>
          <div class="flex items-center gap-xs" id="connection-status">
            <span class="status-dot disconnected" id="status-dot"></span>
            <span class="text-sm text-muted" id="status-text">Checking...</span>
          </div>
        </div>
      </div>
      <button class="btn btn-icon btn-ghost" id="settings-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>

    <!-- Provider Selector -->
    <div class="provider-section glass-panel" id="provider-section">
      <label class="label">LLM Provider</label>
      <div class="flex gap-sm">
        <input type="text" class="select" id="provider-display" readonly style="flex:1; cursor: default; background-color: rgba(255, 255, 255, 0.05); user-select: none;" value="Loading...">
        <select class="select" id="model-select" style="flex:1">
          <option value="">Select model...</option>
        </select>
      </div>
    </div>

    <!-- Hero Action -->
    <button class="btn btn-primary btn-lg btn-full hero-btn" id="summarize-btn">
      <span class="hero-icon">✨</span>
      <span id="summarize-text">Summarize This Page</span>
    </button>

    <!-- Status Area -->
    <div class="status-area hidden" id="status-area">
      <div class="flex items-center gap-md">
        <div class="spinner" id="status-spinner"></div>
        <div>
          <div class="font-medium" id="status-title">Processing...</div>
          <div class="text-sm text-muted" id="status-detail">Extracting page content</div>
        </div>
      </div>
    </div>

    <!-- Error Area -->
    <div class="error-area hidden" id="error-area">
      <div class="flex items-center gap-sm">
        <span>❌</span>
        <span class="text-sm" id="error-text"></span>
      </div>
    </div>

    <!-- Tasks & Activity -->
    <div class="activity-section">
      <div class="flex items-center justify-between mb-sm">
        <label class="label mb-0">Tasks & Activity</label>
        <button class="btn btn-ghost btn-xs text-xs" id="clear-tasks-btn">Clear</button>
      </div>
      
      <div class="tasks-container" id="tasks-container">
        <!-- Tasks will be injected here -->
        <div class="text-sm text-muted py-md text-center" id="no-tasks-msg">
          No recent activity
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <span class="text-sm text-dim">RemAdder v1.0.0</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
